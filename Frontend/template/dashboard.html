<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDoS Shield · Live Dashboard</title>
    <link rel="stylesheet" href="/static/design/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* SECTION TITLE */
        .section-title {
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
        }

        /* MAIN GRID */
        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        /* LEFT PANEL */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* RIGHT PANEL */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* CARD */
        .card {
            background: #0f172a;
            border-radius: 20px;
            padding: 1.2rem;
        }

        /* LARGE CARD */
        .card.large {
            min-height: 260px;
        }

        /* LOG HEADER */
        .log-header {
            display: grid;
            grid-template-columns: 120px 1.5fr 1.5fr 80px;
            font-size: 12px;
            color: #64748b;
            padding: 8px 14px;
            border-bottom: 1px solid #1e293b;
        }

        /* LOG ENTRY */
        .log-entry {
            display: grid;
            grid-template-columns: 120px 1.5fr 1.5fr 80px;
            padding: 10px 14px;
            font-size: 13px;
            color: #e2e8f0;
            border-left: 3px solid #38bdf8;
            border-radius: 10px;
            margin-top: 6px;
            background: #0f172a;
        }

        /* LOGS CONTAINER */
        .logs-card {
            max-height: 260px;
            overflow-y: auto;
        }

        /* SCROLLBAR */
        .logs-card::-webkit-scrollbar {
            width: 6px;
        }

        .logs-card::-webkit-scrollbar-thumb {
            background: #38bdf8;
            border-radius: 10px;
        }

        .logs-card::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>

</head>

<body>

    <div class="dashboard-container">
        <!-- NAVBAR -->
        <div class="top-bar">
            <div class="logo-area">
                🛡️ DDoS Shield
            </div>

            <div class="nav-links">
                <a href="/precautions" class="nav-btn">Precautions</a>
                <a href="/" class="nav-btn">Home</a>
            </div>
        </div>

        <!-- TITLE -->
        <h2 class="page-title">Live Threat Intelligence</h2>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Risk</div>
                <div class="stat-value" id="risk">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Attack</div>
                <div class="stat-value" id="attack">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Severity</div>
                <div class="stat-value" id="severity">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">IP</div>
                <div class="stat-value" id="ip">--</div>
            </div>
        </div>

        <!-- ANALYTICS -->
        <div class="section-title">Attack Analytics</div>

        <div class="main-grid">

            <!-- LEFT -->
            <div class="left-panel">

                <!-- RISK TREND -->
                <div class="card large">
                    <h4>Risk Trend</h4>
                    <canvas id="riskTrendChart"></canvas>
                </div>

                <!-- LOGS -->
                <div class="card logs-card">
                    <h4>Recent Logs</h4>

                    <div class="log-header">
                        <span>Time</span>
                        <span>IP Address</span>
                        <span>Attack</span>
                        <span>Risk</span>
                    </div>

                    <div id="logs"></div>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="right-panel">

                <div class="card">
                    <h4>Attack Distribution</h4>
                    <canvas id="attackChart"></canvas>
                </div>

                <div class="card">
                    <h4>Top Attacker</h4>
                    <p id="top-ip">--</p>
                    <p>Requests: <span id="top-count">0</span></p>
                </div>

                <div class="card">
                    <h4>Status</h4>
                    <p>Traffic: Stable</p>
                    <p>Detection: Active</p>
                    <p>Confidence: Moderate</p>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='logic_js/dashboard.js') }}"></script>

</body>

</html>
